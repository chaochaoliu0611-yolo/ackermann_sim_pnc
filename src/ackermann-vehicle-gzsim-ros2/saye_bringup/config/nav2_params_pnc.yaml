# ══════════════════════════════════════════════════════════════════
# SAYE PNC 精简版 Nav2 配置文件
# ──────────────────────────────────────────────────────────────────
# 只保留自定义 PNC 栈需要的基础设施:
#   amcl, map_server, map_saver, global_costmap, local_costmap
# ──────────────────────────────────────────────────────────────────
# 已被自定义 PNC 替换的组件 (不再使用):
#   bt_navigator, planner_server, controller_server,
#   behavior_server, smoother_server, waypoint_follower,
#   collision_monitor, docking_server, velocity_smoother
# ══════════════════════════════════════════════════════════════════

# ── AMCL (定位) ─────────────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "saye"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 50.0
    laser_min_range: 0.3
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 500
    min_particles: 50
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.3
    update_min_d: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    map_topic: map
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

# ── map_server ──────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "map.yaml"

# ── map_saver ───────────────────────────────────────────────────
map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# ── 全局代价地图 (独立节点模式, 一层嵌套即可) ──────────────────
global_costmap:
  ros__parameters:
    use_sim_time: True
    update_frequency: 1.0
    publish_frequency: 1.0
    global_frame: map
    robot_base_frame: saye
    footprint: "[[0.15, 0.045], [0.15, -0.045], [-0.15, -0.045], [-0.15, 0.045]]"
    resolution: 0.05
    track_unknown_space: true
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: True
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        raytrace_min_range: 0.0
        obstacle_max_range: 2.5
        obstacle_min_range: 0.0
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: True
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 3.0
      inflation_radius: 0.35
    always_send_full_costmap: True

# ── 局部代价地图 (独立节点模式, 一层嵌套即可) ──────────────────
local_costmap:
  ros__parameters:
    use_sim_time: True
    update_frequency: 5.0
    publish_frequency: 2.0
    global_frame: odom
    robot_base_frame: saye
    rolling_window: true
    width: 3
    height: 3
    resolution: 0.05
    footprint: "[[0.15, 0.045], [0.15, -0.045], [-0.15, -0.045], [-0.15, 0.045]]"
    plugins: ["voxel_layer", "inflation_layer"]
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 3.0
      inflation_radius: 0.35
    voxel_layer:
      plugin: "nav2_costmap_2d::VoxelLayer"
      enabled: True
      publish_voxel_map: True
      origin_z: 0.0
      z_resolution: 0.05
      z_voxels: 16
      max_obstacle_height: 2.0
      mark_threshold: 0
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        raytrace_min_range: 0.0
        obstacle_max_range: 2.5
        obstacle_min_range: 0.0
    always_send_full_costmap: True
